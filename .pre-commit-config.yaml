# .pre-commit-config.yaml
#
# Runs ruff format + lint on every `git commit`. Keeps the codebase
# consistently formatted and import-sorted without a CI round-trip.
#
# Activation (per-developer, one-time):
#   pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
